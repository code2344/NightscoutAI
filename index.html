<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nightscout BG Predictor Dashboard</title>
<script src="https://cdn.skypack.dev/@tensorflow/tfjs@4.5.0"></script>
<script src="https://cdn.skypack.dev/chart.js@4.4.0"></script>
<script>
// Fallback CDN loading - removed error override to allow demo mode
if (typeof tf === 'undefined') {
    console.log('Loading TensorFlow.js from alternative CDN...');
    const tfScript = document.createElement('script');
    tfScript.src = 'https://unpkg.com/@tensorflow/tfjs@4.5.0/dist/tf.min.js';
    tfScript.onerror = () => console.error('TensorFlow.js not available, using demo mode');
    document.head.appendChild(tfScript);
}
if (typeof Chart === 'undefined') {
    console.log('Loading Chart.js from alternative CDN...');
    const chartScript = document.createElement('script');
    chartScript.src = 'https://unpkg.com/chart.js@4.4.0/dist/chart.min.js';
    chartScript.onerror = () => console.error('Chart.js not available');
    document.head.appendChild(chartScript);
}
</script>
<style>
body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    padding: 20px; 
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #333;
    min-height: 100vh;
    margin: 0;
}
.container {
    max-width: 1200px;
    margin: 0 auto;
    background: white;
    border-radius: 15px;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
h1 { 
    font-size: 2.5em; 
    color: #4a5568;
    text-align: center;
    margin-bottom: 30px;
    background: linear-gradient(45deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.current-readings {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}
.reading-card {
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    color: white;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
.reading-value {
    font-size: 2em;
    font-weight: bold;
    margin: 10px 0;
}
.reading-label {
    font-size: 0.9em;
    opacity: 0.9;
}
.controls {
    margin: 20px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
}
.url-input {
    padding: 12px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    flex: 1;
    min-width: 300px;
    font-size: 14px;
}
button { 
    padding: 12px 24px; 
    margin: 5px; 
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s ease;
    font-size: 14px;
}
button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}
.stats { 
    margin-top: 20px; 
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
}
.stat-card {
    background: #f8fafc;
    padding: 15px;
    border-radius: 8px;
    border-left: 4px solid #667eea;
}
.stat-label {
    font-size: 0.9em;
    color: #64748b;
    margin-bottom: 5px;
}
.stat-value {
    font-size: 1.4em;
    font-weight: bold;
    color: #1e293b;
}
#chart-container { 
    width:100%; 
    margin-top:30px; 
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
.loading {
    display: none;
    text-align: center;
    margin: 20px 0;
}
.loading.show {
    display: block;
}
.spinner {
    border: 4px solid #f3f3f3;
    border-top: 4px solid #667eea;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin: 0 auto;
}
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
.error-message {
    background: #fef2f2;
    color: #dc2626;
    padding: 15px;
    border-radius: 8px;
    border-left: 4px solid #dc2626;
    margin: 10px 0;
    display: none;
}
.success-message {
    background: #f0fdf4;
    color: #16a34a;
    padding: 15px;
    border-radius: 8px;
    border-left: 4px solid #16a34a;
    margin: 10px 0;
    display: none;
}
@media (max-width: 768px) {
    .container {
        padding: 15px;
        margin: 10px;
    }
    h1 {
        font-size: 2em;
    }
    .controls {
        flex-direction: column;
        align-items: stretch;
    }
    .url-input {
        min-width: auto;
    }
}
</style>
</head>
<body>
<div class="container">
    <h1>🩸 Nightscout AI Predictor</h1>
    
    <div class="controls">
        <input type="url" id="nightscout-url" class="url-input" placeholder="Enter your Nightscout URL (e.g., https://yoursite.herokuapp.com)" value="https://rubensnightscout.herokuapp.com">

        <button id="update-btn">🔄 Fetch & Train</button>

    <div class="current-readings">

        </div>
        <div class="reading-card">
            <div class="reading-label">Predicted BG</div>
            <div class="reading-value" id="predicted-bg">-</div>
            <div class="reading-label" id="predicted-unit-label">mg/dL</div>
        </div>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">Average Loss</div>
            <div class="stat-value" id="avg-loss">-</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Prediction Error</div>
            <div class="stat-value" id="avg-error">-</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Training Steps</div>
            <div class="stat-value" id="train-steps">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Sequence Length</div>
            <div class="stat-value" id="seq-len">-</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">LSTM Units</div>
            <div class="stat-value" id="lstm-units">-</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total Data Points</div>
            <div class="stat-value" id="total-data">-</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Anomalies Detected</div>
            <div class="stat-value" id="anomalies-count">0</div>
        </div>
    </div>

    <div id="chart-container">
        <canvas id="bg-chart"></canvas>
    </div>
</div>

<script>
// Demo data for testing when external APIs are not available
const DEMO_DATA = [
    [120, 0, 0, Date.now() - 600000], [125, 0, 15, Date.now() - 570000], [140, 0, 0, Date.now() - 540000],
    [155, 0, 0, Date.now() - 510000], [170, 0, 0, Date.now() - 480000], [180, 2, 0, Date.now() - 450000],
    [175, 0, 0, Date.now() - 420000], [165, 0, 0, Date.now() - 390000], [150, 0, 0, Date.now() - 360000],
    [135, 0, 0, Date.now() - 330000], [125, 0, 0, Date.now() - 300000], [115, 0, 0, Date.now() - 270000],
    [110, 0, 0, Date.now() - 240000], [105, 0, 0, Date.now() - 210000], [100, 0, 0, Date.now() - 180000],
    [95, 0, 0, Date.now() - 150000], [90, 0, 20, Date.now() - 120000], [100, 0, 0, Date.now() - 90000],
    [115, 0, 0, Date.now() - 60000], [130, 0, 0, Date.now() - 30000], [140, 0, 0, Date.now()]
];

// Check if running in demo mode
let isDemoMode = false;

// CONFIG
let NIGHTSCOUT_URL = 'https://rubensnightscout.herokuapp.com';
const SEQ_LEN = 10;  // sliding window length
const FEATURES = 3;  // [bg, insulin, carbs]
const LSTM_UNITS = 16;
const BG_MIN_MGDL = 40, BG_MAX_MGDL = 400;  // for normalization in mg/dL
const BG_MIN_MMOL = 2.2, BG_MAX_MMOL = 22.2;  // for normalization in mmol/L
const MGDL_TO_MMOL = 0.0555;  // Conversion factor: mg/dL to mmol/L
const MMOL_TO_MGDL = 18.016;   // Conversion factor: mmol/L to mg/dL

// Unit preferences
let currentUnit = 'mgdl'; // 'mgdl' or 'mmol'

// Auto-training settings
let autoTrainEnabled = false;
let autoTrainInterval = null;
const AUTO_TRAIN_INTERVAL_MS = 10 * 60 * 1000; // 10 minutes

// Anomaly detection
let detectedAnomalies = [];
const ANOMALY_THRESHOLD_MGDL = 100; // mg/dL change threshold
const ANOMALY_THRESHOLD_MMOL = 5.5; // mmol/L change threshold

// Check if TensorFlow.js is available, if not use demo mode
function initializeApp() {
    if (typeof tf === 'undefined') {
        console.log('TensorFlow.js not available, running in demo mode');
        isDemoMode = true;
        showError('Running in demo mode - external libraries not available');
        return;
    }
    
    // MODEL SETUP
    model = tf.sequential();
    model.add(tf.layers.lstm({units:LSTM_UNITS, inputShape:[SEQ_LEN-1, FEATURES]}));
    model.add(tf.layers.dense({units:1}));
    model.compile({optimizer:'adam', loss:'meanSquaredError'});
    
    // Initialize chart
    initializeChart();
}

// DATA BUFFER & STATS
let sequenceBuffer = [];
let totalLoss = 0, totalPredError = 0, count = 0;
let model;
let chart;

// UI HELPERS
function showLoading(show = true) {
    document.getElementById('loading').classList.toggle('show', show);
    document.getElementById('update-btn').disabled = show;
}

function showError(message) {
    const errorEl = document.getElementById('error-message');
    errorEl.textContent = message;
    errorEl.style.display = 'block';
    setTimeout(() => errorEl.style.display = 'none', 5000);
}

function showSuccess(message) {
    const successEl = document.getElementById('success-message');
    successEl.textContent = message;
    successEl.style.display = 'block';
    setTimeout(() => successEl.style.display = 'none', 3000);
}

// CHART SETUP
function initializeChart() {
    if (typeof Chart === 'undefined') {
        console.log('Chart.js not available, charts disabled');
        document.getElementById('chart-container').innerHTML = '<p>Charts not available - external libraries not loaded</p>';
        return;
    }
    
    const ctx = document.getElementById('bg-chart').getContext('2d');
    chart = new Chart(ctx, {
        type: 'line',
        data: { 
            labels: [], 
            datasets: [
                { 
                    label:'Actual BG', 
                    data:[], 
                    borderColor:'#667eea', 
                    backgroundColor:'rgba(102, 126, 234, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 2,
                    pointHoverRadius: 6
                },
                { 
                    label:'Predicted BG', 
                    data:[], 
                    borderColor:'#f5576c', 
                    backgroundColor:'rgba(245, 87, 108, 0.1)',
                    fill: false,
                    tension: 0.4,
                    pointRadius: 2,
                    pointHoverRadius: 6,
                    borderDash: [5, 5]
                }
            ]
        },
        options:{ 
            responsive: true, 
            maintainAspectRatio: false,
            plugins: {
                title: {
                    display: true,
                    text: 'Blood Glucose Prediction Chart',
                    font: { size: 16, weight: 'bold' }
                },
                legend: {
                    display: true,
                    position: 'top'
                }
            },
            scales: { 
                x: {
                    display: true,
                    title: {
                        display: true,
                        text: 'Time Points'
                    },
                    grid: {
                        color: 'rgba(0,0,0,0.1)'
                    }
                }, 
                y: {
                    display: true, 
                    suggestedMin: currentUnit === 'mmol' ? 2 : 40, 
                    suggestedMax: currentUnit === 'mmol' ? 22 : 400,
                    title: {
                        display: true,
                        text: `Blood Glucose (${getCurrentUnitLabel()})`
                    },
                    grid: {
                        color: 'rgba(0,0,0,0.1)'
                    }
                } 
            },
            interaction: {
                intersect: false,
                mode: 'index'
            }
        }
    });

    // Set chart container height
    document.getElementById('chart-container').style.height = '400px';
}

// HELPERS
function mgdlToMmol(mgdl) { return mgdl * MGDL_TO_MMOL; }
function mmolToMgdl(mmol) { return mmol * MMOL_TO_MGDL; }

function normalizeBG(bg) { 
    if (currentUnit === 'mmol') {
        return (bg - BG_MIN_MMOL) / (BG_MAX_MMOL - BG_MIN_MMOL);
    } else {
        return (bg - BG_MIN_MGDL) / (BG_MAX_MGDL - BG_MIN_MGDL);
    }
}

function denormalizeBG(norm) { 
    if (currentUnit === 'mmol') {
        return norm * (BG_MAX_MMOL - BG_MIN_MMOL) + BG_MIN_MMOL;
    } else {
        return norm * (BG_MAX_MGDL - BG_MIN_MGDL) + BG_MIN_MGDL;
    }
}

function convertBgToCurrentUnit(bgMgdl) {
    return currentUnit === 'mmol' ? mgdlToMmol(bgMgdl) : bgMgdl;
}

function formatBgValue(bg, unit) {
    if (unit === 'mmol') {
        return bg.toFixed(1);
    } else {
        return Math.round(bg).toString();
    }
}

// ANOMALY DETECTION
function detectAnomalies(data) {
    if (!data || data.length < 3) return [];
    
    const anomalies = [];
    const threshold = currentUnit === 'mmol' ? ANOMALY_THRESHOLD_MMOL : ANOMALY_THRESHOLD_MGDL;
    
    for (let i = 1; i < data.length - 1; i++) {
        const prev = convertBgToCurrentUnit(data[i-1][0]);
        const curr = convertBgToCurrentUnit(data[i][0]);
        const next = convertBgToCurrentUnit(data[i+1][0]);
        
        // Check for sudden spike/drop that immediately reverses
        const dropThenRise = (prev - curr > threshold) && (next - curr > threshold * 0.8);
        const riseThenDrop = (curr - prev > threshold) && (curr - next > threshold * 0.8);
        
        // Check for extreme values that are outliers
        const isExtreme = curr < (currentUnit === 'mmol' ? 2.2 : 40) || curr > (currentUnit === 'mmol' ? 22.2 : 400);
        
        // Check for impossible rate of change (>5 mmol/L or >90 mg/dL per 5 minutes)
        const timeDiffMinutes = (data[i][3] - data[i-1][3]) / (1000 * 60);
        const rateOfChange = Math.abs(curr - prev) / Math.max(timeDiffMinutes / 5, 1);
        const impossibleRate = rateOfChange > (currentUnit === 'mmol' ? 5 : 90);
        
        if (dropThenRise || riseThenDrop || isExtreme || impossibleRate) {
            anomalies.push({
                index: i,
                timestamp: data[i][3],
                value: curr,
                type: dropThenRise ? 'spike-down' : riseThenDrop ? 'spike-up' : isExtreme ? 'extreme' : 'rate',
                reason: dropThenRise ? 'Sudden drop then recovery' : 
                       riseThenDrop ? 'Sudden rise then drop' :
                       isExtreme ? 'Extreme value' : 'Impossible rate of change'
            });
        }
    }
    
    return anomalies;
}

function filterAnomalies(data, anomalies) {
    if (!anomalies || anomalies.length === 0) return data;
    
    const anomalyIndices = new Set(anomalies.map(a => a.index));
    return data.filter((_, index) => !anomalyIndices.has(index));
}

// AUTO-TRAINING FUNCTIONS
function startAutoTraining() {
    if (autoTrainInterval) {
        clearInterval(autoTrainInterval);
    }
    
    autoTrainInterval = setInterval(async () => {
        if (!document.getElementById('update-btn').disabled) {
            console.log('Auto-training: Fetching new data...');
            try {
                await updateUI();
                console.log('Auto-training: Successfully updated model');
            } catch (error) {
                console.error('Auto-training error:', error);
            }
        }
    }, AUTO_TRAIN_INTERVAL_MS);
    
    showSuccess(`Auto-training enabled! Model will update every ${AUTO_TRAIN_INTERVAL_MS / 60000} minutes.`);
}

function stopAutoTraining() {
    if (autoTrainInterval) {
        clearInterval(autoTrainInterval);
        autoTrainInterval = null;
    }
    showSuccess('Auto-training disabled.');
}

function updateAutoTrainButton() {
    const button = document.getElementById('auto-train-toggle');
    if (autoTrainEnabled) {
        button.textContent = '⏰ Auto-Train: ON';
        button.style.background = 'linear-gradient(135deg, #16a34a 0%, #15803d 100%)';
    } else {
        button.textContent = '⏰ Auto-Train: OFF';
        button.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
    }
}

function getCurrentUnitLabel() {
    return currentUnit === 'mmol' ? 'mmol/L' : 'mg/dL';
}
function addReading(reading){
    sequenceBuffer.push(reading);
    if(sequenceBuffer.length > SEQ_LEN) sequenceBuffer.shift();
}
function bufferToTensor(buffer){
    return tf.tensor([buffer]);
}

// TRAINING ON SEQUENCES
async function trainOnSequence(seq){
    if (isDemoMode) {
        // Simulate training for demo
        count = seq.length - SEQ_LEN + 1;
        totalLoss = Math.random() * 0.1;
        totalPredError = Math.random() * 20 + 10;
        return;
    }
    
    if(seq.length < SEQ_LEN) return;
    
    let trainedCount = 0;
    const totalTrainingSteps = seq.length - SEQ_LEN + 1;
    
    for(let i=0;i<=seq.length-SEQ_LEN;i++){
        // Convert BG values to current unit for training
        const bgInCurrentUnit = convertBgToCurrentUnit(seq[i+SEQ_LEN-1][0]);
        const inputSeq = seq.slice(i,i+SEQ_LEN-1).map(r=>[normalizeBG(convertBgToCurrentUnit(r[0])), r[1], r[2]]);
        const targetBG = normalizeBG(bgInCurrentUnit);
        const X = bufferToTensor(inputSeq);
        const Y = tf.tensor([[targetBG]]);
        
        try {
            const loss = await model.trainOnBatch(X,Y);
            totalLoss += loss;
            const pred = denormalizeBG(model.predict(X).dataSync()[0]);
            totalPredError += Math.abs(pred - bgInCurrentUnit);
            count++;
            trainedCount++;
        } catch (error) {
            console.error('Training error:', error);
        } finally {
            X.dispose(); 
            Y.dispose();
        }
        
        // Update progress periodically
        if (trainedCount % 50 === 0) {
            await new Promise(resolve => setTimeout(resolve, 1));
        }
    }
}

// PREDICT NEXT BG
function predictNext(){
    if (isDemoMode) {
        // Simple prediction for demo: average of last few readings with some trend
        if (sequenceBuffer.length < 3) return null;
        const recent = sequenceBuffer.slice(-3).map(r => convertBgToCurrentUnit(r[0]));
        const avg = recent.reduce((a, b) => a + b) / recent.length;
        const trend = (recent[recent.length - 1] - recent[0]) / recent.length;
        const minBg = currentUnit === 'mmol' ? 3.3 : 60;
        const maxBg = currentUnit === 'mmol' ? 16.7 : 300;
        return Math.max(minBg, Math.min(maxBg, avg + trend * 2));
    }
    
    if(sequenceBuffer.length < SEQ_LEN) return null;
    try {
        const inputSeq = sequenceBuffer.slice(0,SEQ_LEN-1).map(r=>[normalizeBG(convertBgToCurrentUnit(r[0])), r[1], r[2]]);
        const X = bufferToTensor(inputSeq);
        const predNorm = model.predict(X).dataSync()[0];
        X.dispose();
        return denormalizeBG(predNorm);
    } catch (error) {
        console.error('Prediction error:', error);
        return null;
    }
}

// UPDATE UI
function updateStatsUI(totalPoints){
    document.getElementById('avg-loss').textContent = (count>0? (totalLoss/count).toFixed(4) : '-');
    const errorText = count>0? (totalPredError/count).toFixed(2) + ' ' + getCurrentUnitLabel() : '-';
    document.getElementById('avg-error').textContent = errorText;
    document.getElementById('train-steps').textContent = count.toLocaleString();
    document.getElementById('seq-len').textContent = SEQ_LEN;
    document.getElementById('lstm-units').textContent = LSTM_UNITS;
    document.getElementById('total-data').textContent = totalPoints.toLocaleString();
    document.getElementById('anomalies-count').textContent = detectedAnomalies.length.toLocaleString();
}

function updateUnitLabels() {
    const unitLabel = getCurrentUnitLabel();
    document.getElementById('current-unit-label').textContent = unitLabel;
    document.getElementById('predicted-unit-label').textContent = unitLabel;
    document.getElementById('unit-toggle').textContent = `🔄 ${unitLabel}`;
}

// FETCH ALL NIGHTSCOUT DATA
async function fetchAllData(){
    try{
        const res = await fetch(`${NIGHTSCOUT_URL}/api/v1/entries.json`);
        const data = await res.json();
        return data.map(e=>[e.sgv, e.insulin||0, e.carbs||0, new Date(e.dateString || e.date).getTime()])
                   .filter(e => !isNaN(e[0]) && e[0] > 0) // filter invalid BG readings
                   .sort((a,b)=>a[3]-b[3]); // sort by timestamp
    }catch(err){ console.error("Error fetching Nightscout:", err); return []; }
}

// FETCH ALL NIGHTSCOUT DATA
async function fetchAllData(){
    if (isDemoMode) {
        showSuccess('Using demo data for testing');
        // Detect anomalies in demo data
        detectedAnomalies = detectAnomalies(DEMO_DATA);
        
        // Filter out anomalies for training (but keep them for display)
        const cleanData = filterAnomalies(DEMO_DATA, detectedAnomalies);
        
        if (detectedAnomalies.length > 0) {
            console.log(`Detected ${detectedAnomalies.length} potential anomalies in demo data:`, detectedAnomalies);
        }
        
        return cleanData;
    }
    
    try{
        const url = document.getElementById('nightscout-url').value.trim();
        if (!url) {
            throw new Error('Please enter a valid Nightscout URL');
        }
        
        NIGHTSCOUT_URL = url.endsWith('/') ? url.slice(0, -1) : url;
        
        const res = await fetch(`${NIGHTSCOUT_URL}/api/v1/entries.json`);
        if (!res.ok) {
            throw new Error(`HTTP ${res.status}: ${res.statusText}`);
        }
        
        const data = await res.json();
        if (!Array.isArray(data) || data.length === 0) {
            throw new Error('No data received from Nightscout API');
        }
        
        const processedData = data.map(e=>[e.sgv, e.insulin||0, e.carbs||0, new Date(e.dateString || e.date).getTime()])
                   .filter(e => !isNaN(e[0]) && e[0] > 0 && e[0] < 1000) // filter invalid BG readings
                   .sort((a,b)=>a[3]-b[3]); // sort by timestamp
        
        // Detect anomalies
        detectedAnomalies = detectAnomalies(processedData);
        
        // Filter out anomalies for training (but keep them for display)
        const cleanData = filterAnomalies(processedData, detectedAnomalies);
        
        if (detectedAnomalies.length > 0) {
            console.log(`Detected ${detectedAnomalies.length} potential anomalies:`, detectedAnomalies);
        }
        
        return cleanData;
    }catch(err){ 
        console.error("Error fetching Nightscout:", err); 
        throw err;
    }
}

// UPDATE DASHBOARD
async function updateUI(){
    showLoading(true);
    try {
        const allData = await fetchAllData();
        if(allData.length === 0) {
            throw new Error('No valid data points found');
        }

        if(allData.length < SEQ_LEN) {
            throw new Error(`Need at least ${SEQ_LEN} data points, but only found ${allData.length}`);
        }

        sequenceBuffer = allData.slice(-SEQ_LEN); // initialize buffer

        await trainOnSequence(allData);

        const latestBG = convertBgToCurrentUnit(allData[allData.length-1][0]);
        document.getElementById('latest-bg').textContent = formatBgValue(latestBG, currentUnit);

        const nextBG = predictNext();
        if(nextBG !== null) {
            document.getElementById('predicted-bg').textContent = formatBgValue(nextBG, currentUnit);
        } else {
            document.getElementById('predicted-bg').textContent = 'Error';
        }

        updateStatsUI(allData.length);

        // update chart with time-based labels
        if (chart) {
            const timeLabels = allData.map((_, i) => {
                const date = new Date(allData[i][3]);
                return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            });
            
            chart.data.labels = timeLabels;
            chart.data.datasets[0].data = allData.map(d=>parseFloat(formatBgValue(convertBgToCurrentUnit(d[0]), currentUnit)));
            
            const preds = [];
            if (isDemoMode) {
                // Simple predictions for demo mode
                for(let i=SEQ_LEN-1;i<allData.length;i++){
                    const recent = allData.slice(Math.max(0, i-2), i+1).map(r => convertBgToCurrentUnit(r[0]));
                    const avg = recent.reduce((a, b) => a + b) / recent.length;
                    const trend = recent.length > 1 ? (recent[recent.length - 1] - recent[0]) / recent.length : 0;
                    const minBg = currentUnit === 'mmol' ? 3.3 : 60;
                    const maxBg = currentUnit === 'mmol' ? 16.7 : 300;
                    const predValue = Math.max(minBg, Math.min(maxBg, avg + trend * 1.5));
                    preds.push(parseFloat(formatBgValue(predValue, currentUnit)));
                }
            } else {
                for(let i=SEQ_LEN-1;i<allData.length;i++){
                    try {
                        const inputSeq = allData.slice(i-(SEQ_LEN-1),i).map(r=>[normalizeBG(convertBgToCurrentUnit(r[0])), r[1], r[2]]);
                        const X = bufferToTensor(inputSeq);
                        const predValue = denormalizeBG(model.predict(X).dataSync()[0]);
                        preds.push(parseFloat(formatBgValue(predValue, currentUnit)));
                        X.dispose();
                    } catch (error) {
                        preds.push(null);
                    }
                }
            }
            chart.data.datasets[1].data = Array(SEQ_LEN-1).fill(null).concat(preds);
            
            // Update chart y-axis range and title
            chart.options.scales.y.suggestedMin = currentUnit === 'mmol' ? 2 : 40;
            chart.options.scales.y.suggestedMax = currentUnit === 'mmol' ? 22 : 400;
            chart.options.scales.y.title.text = `Blood Glucose (${getCurrentUnitLabel()})`;
            chart.update();
        }
        
        if (detectedAnomalies.length > 0) {
            showSuccess(`Successfully processed ${allData.length} data points, detected ${detectedAnomalies.length} anomalies, and trained the model!`);
        } else {
            showSuccess(`Successfully processed ${allData.length} data points and trained the model!`);
        }
        
    } catch (error) {
        showError(`Error: ${error.message}`);
        console.error('Update UI error:', error);
    } finally {
        showLoading(false);
    }
}

// MODEL PERSISTENCE
async function saveModel() {
    try {
        showLoading(true);
        await model.save('indexeddb://nightscout-bg-model');
        showSuccess('Model saved successfully to browser storage!');
    } catch (error) {
        showError(`Failed to save model: ${error.message}`);
        console.error('Save model error:', error);
    } finally {
        showLoading(false);
    }
}

async function loadModel() {
    try {
        showLoading(true);
        const loadedModel = await tf.loadLayersModel('indexeddb://nightscout-bg-model');
        model.dispose(); // Clean up old model
        model = loadedModel;
        showSuccess('Model loaded successfully from browser storage!');
        
        // Update UI to show loaded model stats
        document.getElementById('lstm-units').textContent = LSTM_UNITS;
        document.getElementById('seq-len').textContent = SEQ_LEN;
        
    } catch (error) {
        showError(`Failed to load model: ${error.message}`);
        console.error('Load model error:', error);
    } finally {
        showLoading(false);
    }
}

// BUTTON HANDLERS
document.getElementById('update-btn').addEventListener('click', updateUI);
document.getElementById('save-btn').addEventListener('click', saveModel);
document.getElementById('load-btn').addEventListener('click', loadModel);
document.getElementById('auto-train-toggle').addEventListener('click', function() {
    autoTrainEnabled = !autoTrainEnabled;
    localStorage.setItem('auto-train', autoTrainEnabled);
    updateAutoTrainButton();
    
    if (autoTrainEnabled) {
        startAutoTraining();
    } else {
        stopAutoTraining();
    }
});
document.getElementById('unit-toggle').addEventListener('click', function() {
    currentUnit = currentUnit === 'mgdl' ? 'mmol' : 'mgdl';
    localStorage.setItem('bg-unit', currentUnit);
    updateUnitLabels();
    
    // Update displayed values if we have data
    const latestBgEl = document.getElementById('latest-bg');
    const predictedBgEl = document.getElementById('predicted-bg');
    
    if (latestBgEl.textContent !== '-' && !isNaN(parseFloat(latestBgEl.textContent))) {
        // Convert and update current BG display
        let currentBgValue = parseFloat(latestBgEl.textContent);
        // If switching from mg/dL to mmol/L, convert
        if (currentUnit === 'mmol' && currentBgValue > 30) {
            currentBgValue = mgdlToMmol(currentBgValue);
        }
        // If switching from mmol/L to mg/dL, convert
        else if (currentUnit === 'mgdl' && currentBgValue < 30) {
            currentBgValue = mmolToMgdl(currentBgValue);
        }
        latestBgEl.textContent = formatBgValue(currentBgValue, currentUnit);
    }
    
    if (predictedBgEl.textContent !== '-' && !isNaN(parseFloat(predictedBgEl.textContent))) {
        // Convert and update predicted BG display
        let predictedBgValue = parseFloat(predictedBgEl.textContent);
        // If switching from mg/dL to mmol/L, convert
        if (currentUnit === 'mmol' && predictedBgValue > 30) {
            predictedBgValue = mgdlToMmol(predictedBgValue);
        }
        // If switching from mmol/L to mg/dL, convert
        else if (currentUnit === 'mgdl' && predictedBgValue < 30) {
            predictedBgValue = mmolToMgdl(predictedBgValue);
        }
        predictedBgEl.textContent = formatBgValue(predictedBgValue, currentUnit);
    }
    
    // Reset training stats when switching units
    totalLoss = 0;
    totalPredError = 0;
    count = 0;
    showSuccess(`Switched to ${getCurrentUnitLabel()}. Please retrain the model for accurate predictions.`);
});

// URL validation
document.getElementById('nightscout-url').addEventListener('input', function(e) {
    const url = e.target.value.trim();
    const isValid = url === '' || /^https?:\/\/.+/.test(url);
    e.target.style.borderColor = isValid ? '#e2e8f0' : '#dc2626';
});

// Initialize UI
document.addEventListener('DOMContentLoaded', function() {
    // Load saved unit preference
    const savedUnit = localStorage.getItem('bg-unit');
    if (savedUnit && (savedUnit === 'mgdl' || savedUnit === 'mmol')) {
        currentUnit = savedUnit;
    }
    updateUnitLabels();
    
    // Load saved auto-train preference
    const savedAutoTrain = localStorage.getItem('auto-train');
    if (savedAutoTrain === 'true') {
        autoTrainEnabled = true;
    }
    updateAutoTrainButton();
    
    // Initialize the app
    setTimeout(initializeApp, 100); // Give time for external scripts to load
    
    // Set initial values
    document.getElementById('seq-len').textContent = SEQ_LEN;
    document.getElementById('lstm-units').textContent = LSTM_UNITS;
    
    // Load saved URL from localStorage
    const savedUrl = localStorage.getItem('nightscout-url');
    if (savedUrl) {
        document.getElementById('nightscout-url').value = savedUrl;
    }
    
    // Save URL to localStorage when changed
    document.getElementById('nightscout-url').addEventListener('change', function(e) {
        localStorage.setItem('nightscout-url', e.target.value);
    });
    
    // Add demo button for testing
    const demoBtn = document.createElement('button');
    demoBtn.textContent = '🎮 Demo Mode';
    demoBtn.style.background = 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)';
    demoBtn.addEventListener('click', function() {
        isDemoMode = true;
        updateUI();
    });
    document.querySelector('.controls').appendChild(demoBtn);
    
    // Start auto-training if enabled
    if (autoTrainEnabled) {
        startAutoTraining();
    }
});
